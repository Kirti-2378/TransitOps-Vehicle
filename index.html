<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps | Smart Transport Operations Platform</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-mode">
  
  <div id="app-layout" class="app-layout">
    
    <!-- Sidebar Navigation -->
    <aside class="app-sidebar" id="app-sidebar">
      <div class="sidebar-brand">
        <div class="logo-icon">
          <i data-lucide="truck"></i>
        </div>
        <span class="brand-text">Transit<span>Ops</span></span>
      </div>

      <nav class="sidebar-nav">
        <ul>
          <li>
            <a href="#/dashboard" class="nav-link active" data-hash="#/dashboard">
              <i data-lucide="layout-dashboard"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="#/vehicles" class="nav-link" data-hash="#/vehicles">
              <i data-lucide="container"></i>
              <span>Vehicle Registry</span>
            </a>
          </li>
          <li>
            <a href="#/drivers" class="nav-link" data-hash="#/drivers">
              <i data-lucide="users"></i>
              <span>Driver Profiles</span>
            </a>
          </li>
          <li class="trip-dispatch-nav" style="display: none;">
            <a href="#/trips" class="nav-link" data-hash="#/trips">
              <i data-lucide="navigation"></i>
              <span>Trip Dispatch</span>
            </a>
          </li>
          <li class="maint-nav" style="display: none;">
            <a href="#/maintenance" class="nav-link" data-hash="#/maintenance">
              <i data-lucide="wrench"></i>
              <span>Maintenance Logs</span>
            </a>
          </li>
          <li class="expenses-nav" style="display: none;">
            <a href="#/expenses" class="nav-link" data-hash="#/expenses">
              <i data-lucide="wallet"></i>
              <span>Fuel & Expenses</span>
            </a>
          </li>
          <li class="reports-nav" style="display: none;">
            <a href="#/reports" class="nav-link" data-hash="#/reports">
              <i data-lucide="line-chart"></i>
              <span>Reports & Analytics</span>
            </a>
          </li>
          <li>
            <a href="#/logs" class="nav-link" data-hash="#/logs">
              <i data-lucide="file-text"></i>
              <span>Activity Logs</span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- Active User Profile Box -->
      <div class="sidebar-profile" id="sidebar-profile" style="display: none;">
        <div class="profile-avatar">
          <div class="avatar-letter" id="user-avatar-letter">F</div>
        </div>
        <div class="profile-info">
          <div class="profile-name" id="user-profile-name">Frank Miller</div>
          <div class="profile-role" id="user-profile-role">Fleet Manager</div>
        </div>
        <button class="btn-logout" id="btn-logout-sidebar" title="Log Out">
          <i data-lucide="log-out"></i>
        </button>
      </div>
    </aside>

    <!-- Main Content Layout -->
    <div class="app-body">
      
      <!-- Top Navigation Header -->
      <header class="app-header">
        <button class="btn-icon sidebar-toggle" id="sidebar-toggle" title="Toggle Sidebar">
          <i data-lucide="menu"></i>
        </button>

        <div class="header-search">
          <h2 class="page-title" id="page-title">Dashboard</h2>
        </div>

        <div class="header-actions">
          <!-- Light/Dark Mode Switcher -->
          <button class="btn-icon theme-toggle" id="theme-toggle" title="Toggle Theme">
            <i data-lucide="sun" class="sun-icon"></i>
            <i data-lucide="moon" class="moon-icon"></i>
          </button>

          <!-- Notification Indicator -->
          <div class="notification-trigger-container">
            <button class="btn-icon notification-bell" id="notification-bell" title="Notifications">
              <i data-lucide="bell"></i>
              <span class="notification-badge" id="notification-badge" style="display: none;">0</span>
            </button>
          </div>
          
          <button class="btn btn-secondary mobile-logout-btn" id="btn-logout-header" style="display: none;">
            <i data-lucide="log-out"></i> <span>Logout</span>
          </button>
        </div>
      </header>

      <!-- Central View Content Area -->
      <main class="main-content" id="main-content">
        <!-- Renders dynamically -->
      </main>

    </div>
  </div>

  <!-- Sliding Notification Drawer -->
  <div class="notification-overlay" id="notification-overlay"></div>
  <aside class="notification-drawer" id="notification-drawer">
    <div class="drawer-header">
      <h3>Notifications</h3>
      <div class="drawer-actions">
        <button class="btn-text" id="btn-mark-all-read">Mark all read</button>
        <button class="btn-icon" id="btn-close-drawer">
          <i data-lucide="x"></i>
        </button>
      </div>
    </div>
    <div class="drawer-content" id="notification-list">
      <div class="empty-state">No notifications.</div>
    </div>
  </aside>

  <!-- Toast Alerts -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Reusable Global Modal Container -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-card" id="modal-card">
      <div class="modal-header">
        <h3 id="modal-title">Modal Title</h3>
        <button class="btn-icon" id="modal-btn-close">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Injected modal template -->
      </div>
    </div>
  </div>

  <!-- Entry Coordinator Script -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
